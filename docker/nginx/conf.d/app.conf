server {
    listen 80;

    # Catch-all — accepts any hostname (poachy.test, techhaven.poachy.test, etc.)
    # Laravel/Stancl reads the Host header to determine central vs tenant context.
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Real IP unwrapping when behind a host-level reverse proxy
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  127.0.0.1;
    real_ip_header    X-Real-IP;
    real_ip_recursive on;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # Product images, import files
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # Swagger UI static assets (vendor/swagger-ui served from public/)
    location /docs/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # User-uploaded files via storage symlink
    location /storage/ {
        try_files $uri =404;
    }

    # API and all other routes — Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handler — FastCGI to the app container.
    # In dev, laravel.test has a network alias 'app'; in prod the service IS named 'app'.
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Forward Authorization header (Sanctum bearer tokens)
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;

        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout    120s;
        fastcgi_read_timeout    120s;

        # Retry on graceful restart
        fastcgi_next_upstream error timeout;
    }

    # Block dot-file access
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
