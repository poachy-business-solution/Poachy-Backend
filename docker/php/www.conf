; PHP-FPM pool configuration

[www]
user  = www-data
group = www-data

; Listen on TCP so the nginx container can reach it via laravel.test:9000
listen = 9000

; Dynamic process manager
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests      = 500

; Log worker stdout/stderr to the container log
catch_workers_output = yes

; Pass environment variables through to PHP workers.
; Required so Laravel can read APP_KEY, CENTRAL_DB_*, REDIS_* etc.
clear_env = no
